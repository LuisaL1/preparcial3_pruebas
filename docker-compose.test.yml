services:

  db-test:
    image: postgres:16-alpine
    container_name: tiendauv-db-test
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
      POSTGRES_DB: test_db
    tmpfs:
      - /var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - red-test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_db"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  api-test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: tiendauv-api-test
    environment:
      DATABASE_URL: "postgresql://test_user:test_pass@db-test:5432/test_db"
      PYTHONPATH: "/app"
    ports:
      - "8000:8000"
    depends_on:
      db-test:
        condition: service_healthy
    networks:
      - red-test
    command: ["uvicorn", "src.carrito.api:app", "--host", "0.0.0.0", "--port", "8000"]

networks:
  red-test:
    driver: bridge